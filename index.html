<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>作品展示 | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="relative min-h-screen">
    <div id="particles-js"></div>

    <main class="container mx-auto px-6 max-w-5xl relative z-10">
        <header class="hero-container text-center animate-fade-in">
            <h1 id="hero-title" class="hero-title"></h1>
            <h2 id="hero-subtitle" class="hero-subtitle"></h2>
            <p id="hero-desc" class="hero-desc"></p>
        </header>

        <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Projects injected here -->
        </div>
    </main>

    <!-- Notice Modal -->
    <div id="notice-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center px-4 bg-black/40 backdrop-blur-sm">
        <div class="modal-content shadow-2xl animate-fade-in text-center">
            <h2 id="notice-title" class="text-xl font-black mb-3 text-black"></h2>
            <p id="notice-content" class="text-gray-500 mb-8 text-xs leading-relaxed"></p>
            <button onclick="closeNotice()" class="w-full bg-black text-white font-bold py-4 rounded-lg text-[10px] tracking-widest uppercase hover:opacity-80 transition-all">
                <span id="notice-btn"></span>
            </button>
        </div>
    </div>

    <!-- Detail Modal (CLEAN) -->
    <div id="detail-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/60 backdrop-blur-md" onclick="closeDetail()">
        <div class="modal-content" onclick="event.stopPropagation()">
            
            <button onclick="closeDetail()" class="absolute top-6 right-6 z-50 w-9 h-9 flex items-center justify-center bg-black/5 hover:bg-black/10 rounded-full text-black transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <header class="detail-header">
                <h2 id="detail-title" class="detail-title-compact"></h2>
                <div id="detail-tags" class="flex flex-wrap justify-center gap-2"></div>
            </header>
            
            <div class="detail-body">
                <div id="detail-media" class="detail-media-clean"></div>
                <p id="detail-desc" class="detail-desc text-center max-w-xl mx-auto"></p>
            </div>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/95 backdrop-blur-xl" onclick="closeLightbox()">
        <img id="lightbox-img" class="lightbox-img shadow-2xl">
        <button class="absolute top-8 right-8 text-white/50 hover:text-white transition-colors">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>

    <script src="config.js"></script>
    <script>
        function init() {
            document.getElementById('hero-title').innerText = CONFIG.profile.name;
            document.getElementById('hero-subtitle').innerText = CONFIG.profile.subtitle;
            document.getElementById('hero-desc').innerText = CONFIG.profile.description;

            const grid = document.getElementById('project-grid');
            CONFIG.projects.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'glass-card overflow-hidden cursor-pointer group animate-fade-in flex flex-col relative';
                card.style.animationDelay = (index * 0.1) + "s";
                card.onclick = () => openDetail(index);
                
                // Calculate Media Stats
                let imgCount = 0;
                let vidCount = 0;
                if(item.media && Array.isArray(item.media)) {
                    item.media.forEach(m => {
                        if(m.type === 'video') vidCount++;
                        else imgCount++;
                    });
                } else if(item.src) {
                    if(item.type === 'video') vidCount = 1; else imgCount = 1;
                }

                let badgeHtml = '';
                if(vidCount > 0 || imgCount > 1) {
                    badgeHtml = `<div class="media-badge">`;
                    if(imgCount > 0) badgeHtml += `<span>${imgCount} 图</span>`;
                    if(imgCount > 0 && vidCount > 0) badgeHtml += `<span class="opacity-30">·</span>`;
                    if(vidCount > 0) badgeHtml += `<span>${vidCount} 视</span>`;
                    badgeHtml += `</div>`;
                }

                let tagsHtml = '';
                if(item.tags && item.tags.length > 0) {
                    tagsHtml = `<div class="flex flex-wrap gap-2 mt-4">` + 
                        item.tags.map(tag => `<span class="tag-blue">${tag}</span>`).join('') +
                        `</div>`;
                }

                card.innerHTML = `
                    <div class="h-60 w-full overflow-hidden relative">
                        <img src="${item.cover}" class="w-full h-full object-cover grayscale-[0.3] transition-all duration-1000 group-hover:grayscale-0 group-hover:scale-105">
                        ${badgeHtml}
                    </div>
                    <div class="p-8 flex-1 flex flex-col">
                        <h3 class="text-base font-black text-black tracking-tight mb-2 uppercase">${item.title}</h3>
                        ${tagsHtml}
                        <div class="mt-auto pt-8 flex items-center text-black text-[9px] font-bold tracking-[0.2em] uppercase opacity-30 group-hover:opacity-100 transition-opacity">
                            View Project
                            <svg class="w-3.5 h-3.5 ml-2 transform group-hover:translate-x-1.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            if (CONFIG.notice && CONFIG.notice.show) {
                document.getElementById('notice-title').innerText = CONFIG.notice.title;
                document.getElementById('notice-content').innerText = CONFIG.notice.content;
                document.getElementById('notice-btn').innerText = CONFIG.notice.buttonText;
                document.getElementById('notice-modal').classList.remove('hidden');
                document.getElementById('notice-modal').classList.add('flex');
            }

            initParticles();
        }

        function openDetail(index) {
            const item = CONFIG.projects[index];
            const mediaContainer = document.getElementById('detail-media');
            const tags = document.getElementById('detail-tags');
            const modal = document.getElementById('detail-modal');
            
            document.getElementById('detail-title').innerText = item.title;
            document.getElementById('detail-desc').innerText = item.description;
            tags.innerHTML = item.tags ? item.tags.map(t => `<span class="tag-blue">${t}</span>`).join('') : '';

            // Handle Multiple Media (Magazine Style Layout)
            let mediaList = [];
            
            // 1. Support new 'media' array
            if (item.media && Array.isArray(item.media)) {
                mediaList = [...item.media];
            } 
            // 2. Fallback to old 'src/type' structure
            else if (item.src) {
                mediaList.push({ type: item.type || 'image', src: item.src });
            }

            // 3. User request: Video always first
            mediaList.sort((a, b) => (a.type === 'video' ? -1 : 1));

            // Generate HTML
            let mediaHtml = '';
            mediaList.forEach(m => {
                if (m.type === 'video') {
                    mediaHtml += `
                        <div class="video-wrapper relative rounded-xl mb-6 shadow-sm">
                            <div class="loading-spinner absolute z-10"></div>
                            <video src="${m.src}" controls class="w-full opacity-0 transition-opacity duration-700 relative z-20" oncanplay="this.classList.remove('opacity-0'); this.parentElement.querySelector('.loading-spinner').remove();"></video>
                        </div>`;
                } else {
                    mediaHtml += `<img src="${m.src}" class="w-full h-auto rounded-xl mb-6 shadow-sm cursor-zoom-in" onclick="openLightbox('${m.src}')" loading="lazy">`;
                }
            });

            mediaContainer.innerHTML = mediaHtml;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
            modal.children[0].scrollTop = 0;
        }

        function toggleLightbox(src) {
            const lightbox = document.getElementById('lightbox-modal');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex');
        }

        function openLightbox(src) {
            toggleLightbox(src);
        }

        function closeLightbox() {
            document.getElementById('lightbox-modal').classList.add('hidden');
            document.getElementById('lightbox-modal').classList.remove('flex');
        }

        function closeDetail() {
            const modal = document.getElementById('detail-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('detail-media').innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        function closeNotice() {
            const modal = document.getElementById('notice-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function initParticles() {
            if (typeof particlesJS === 'undefined') return;
            particlesJS('particles-js', {
                "particles": {
                    "number": { "value": 40, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#000000" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.1, "random": true },
                    "size": { "value": 2, "random": true },
                    "line_linked": { "enable": true, "distance": 150, "color": "#000", "opacity": 0.05, "width": 1 },
                    "move": { "enable": true, "speed": 0.6, "direction": "none", "random": true, "straight": false, "out_mode": "out" }
                },
                "retina_detect": true
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
