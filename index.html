<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>作品展示 | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="relative min-h-screen">
    <div id="particles-js"></div>

    <main class="container mx-auto px-5 py-10 md:py-20 max-w-6xl relative z-10">
        <header class="text-center mb-16 md:mb-24 animate-fade-in">
            <div class="inline-block p-2 rounded-2xl bg-white/50 backdrop-blur-sm mb-6 shadow-sm border border-white">
                <div class="w-20 h-20 md:w-24 md:h-24 rounded-xl bg-gradient-to-tr from-blue-500 to-indigo-500 flex items-center justify-center text-white text-3xl font-bold">
                    👨‍💻
                </div>
            </div>
            <h1 id="hero-title" class="text-4xl md:text-5xl font-extrabold tracking-tight text-gradient mb-4"></h1>
            <h2 id="hero-subtitle" class="text-xl md:text-2xl font-medium text-gray-700 mb-6"></h2>
            <p id="hero-desc" class="max-w-2xl mx-auto text-gray-500 leading-relaxed px-4"></p>
        </header>

        <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
            </div>
    </main>

    <div id="notice-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center px-4 bg-gray-900/40 backdrop-blur-sm transition-opacity">
        <div class="glass-panel max-w-sm md:max-w-md w-full rounded-3xl p-8 text-center animate-fade-in relative">
            <h2 id="notice-title" class="text-2xl font-bold mb-4 text-gray-800"></h2>
            <p id="notice-content" class="text-gray-600 mb-8 leading-relaxed"></p>
            <button onclick="closeNotice()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-medium py-3 rounded-xl shadow-lg transition-all transform active:scale-95">
                <span id="notice-btn"></span>
            </button>
        </div>
    </div>

    <div id="detail-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-0 md:p-6 bg-gray-900/60 backdrop-blur-md" onclick="closeDetail(event)">
        <div class="glass-panel w-full h-full md:h-auto md:max-h-[90vh] md:max-w-4xl md:rounded-3xl flex flex-col relative overflow-hidden animate-fade-in" onclick="event.stopPropagation()">
            
            <div class="absolute top-4 right-4 z-10 bg-white/80 backdrop-blur rounded-full shadow-sm">
                <button onclick="closeDetail(null)" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:text-gray-800 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto no-scrollbar p-5 md:p-8 pt-16 md:pt-8">
                <h2 id="detail-title" class="text-2xl md:text-3xl font-bold mb-6 text-gray-800"></h2>
                
                <div id="detail-media" class="mb-6 rounded-2xl overflow-hidden shadow-sm bg-gray-100/50"></div>
                
                <div class="bg-white/50 rounded-2xl p-5 md:p-6 border border-white/60">
                    <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">项目简介</h3>
                    <p id="detail-desc" class="text-gray-700 text-base md:text-lg leading-relaxed"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        function init() {
            // 填充 Hero 区域
            document.getElementById('hero-title').innerText = CONFIG.profile.name;
            document.getElementById('hero-subtitle').innerText = CONFIG.profile.subtitle;
            document.getElementById('hero-desc').innerText = CONFIG.profile.description;

            const grid = document.getElementById('project-grid');
            
            CONFIG.projects.forEach((item, index) => {
                // 生成标签 HTML
                let tagsHtml = '';
                if(item.tags && item.tags.length > 0) {
                    tagsHtml = `<div class="flex flex-wrap gap-2 mt-3">` + 
                        item.tags.map(tag => `<span class="px-2.5 py-1 text-xs font-medium bg-blue-50 text-blue-600 rounded-md border border-blue-100">${tag}</span>`).join('') +
                        `</div>`;
                }

                const card = document.createElement('div');
                card.className = 'glass-card overflow-hidden cursor-pointer group flex flex-col h-full animate-fade-in';
                card.style.animationDelay = `${index * 0.1}s`; // 阶梯动画
                card.onclick = () => openDetail(index);
                
                card.innerHTML = `
                    <div class="h-52 w-full overflow-hidden relative">
                        <img src="${item.cover}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <h3 class="text-xl font-bold text-gray-800 line-clamp-1">${item.title}</h3>
                        ${tagsHtml}
                        <div class="mt-auto pt-4 flex items-center text-blue-600 text-sm font-semibold">
                            查看详情 
                            <svg class="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // 弹窗逻辑
            if (CONFIG.notice.show) {
                document.getElementById('notice-title').innerText = CONFIG.notice.title;
                document.getElementById('notice-content').innerText = CONFIG.notice.content;
                document.getElementById('notice-btn').innerText = CONFIG.notice.buttonText;
                document.getElementById('notice-modal').classList.remove('hidden');
            }

            initParticles();
        }

        function openDetail(index) {
            const item = CONFIG.projects[index];
            const mediaContainer = document.getElementById('detail-media');
            
            document.getElementById('detail-title').innerText = item.title;
            document.getElementById('detail            <div id="detail-media" class="mb-6 rounded-xl overflow-hidden shadow-inner bg-gray-100"></div>
            <p id="detail-desc" class="text-gray-700 text-lg leading-relaxed"></p>
        </div>
    </div>

    <script src="config.js"></script>

    <script>
        // 1. 初始化页面渲染
        function init() {
            const grid = document.getElementById('project-grid');
            
            // 循环配置文件中的数据
            CONFIG.projects.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'glass-card overflow-hidden cursor-pointer';
                card.onclick = () => openDetail(index);
                card.innerHTML = `
                    <div class="h-48 w-full overflow-hidden">
                        <img src="${item.cover}" class="w-full h-full object-cover transform hover:scale-110 transition-transform duration-500">
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-gray-800">${item.title}</h3>
                        <p class="text-blue-500 mt-3 text-sm font-medium italic">View Details →</p>
                    </div>
                `;
                grid.appendChild(card);
            });

            // 2. 显示初始弹窗
            if (CONFIG.notice.show) {
                document.getElementById('notice-title').innerText = CONFIG.notice.title;
                document.getElementById('notice-content').innerText = CONFIG.notice.content;
                document.getElementById('notice-modal').classList.remove('hidden');
            }

            // 3. 初始化粒子
            initParticles();
        }

        // 详情弹窗逻辑
        function openDetail(index) {
            const item = CONFIG.projects[index];
            const mediaContainer = document.getElementById('detail-media');
            
            document.getElementById('detail-title').innerText = item.title;
            document.getElementById('detail-desc').innerText = item.description;
            
            // 根据类型生成视频或图片
            if (item.type === 'video') {
                mediaContainer.innerHTML = `<video src="${item.src}" controls class="w-full"></video>`;
            } else {
                mediaContainer.innerHTML = `<img src="${item.src}" class="w-full h-auto">`;
            }

            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeDetail() {
            document.getElementById('detail-modal').classList.add('hidden');
            document.getElementById('detail-media').innerHTML = ''; // 清空视频防止后台播放
        }

        function closeNotice() {
            document.getElementById('notice-modal').classList.add('hidden');
        }

        // 粒子背景配置
        function initParticles() {
            particlesJS('particles-js', {
                "particles": {
                    "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#3b82f6" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.3, "random": false },
                    "size": { "value": 3, "random": true },
                    "line_linked": { "enable": true, "distance": 150, "color": "#3b82f6", "opacity": 0.2, "width": 1 },
                    "move": { "enable": true, "speed": 1.5, "direction": "none", "random": false, "straight": false, "out_mode": "out" }
                },
                "interactivity": {
                    "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } }
                },
                "retina_detect": true
            });
        }

        // 启动
        window.onload = init;
    </script>
</body>
</html>
