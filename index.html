<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>作品展示 | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div>

    <div class="container">
        <header class="text-center mb-16">
            <h1 class="text-4xl font-extrabold text-gray-800 tracking-tight">Project Showcase</h1>
            <p class="mt-4 text-gray-500">我的程序作品集展示</p>
        </header>

        <div id="project-grid" class="grid">
            </div>
    </div>

    <div id="notice-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/20 backdrop-blur-sm">
        <div class="glass-card max-w-md w-full p-8 text-center modal-animate">
            <h2 id="notice-title" class="text-2xl font-bold mb-4"></h2>
            <p id="notice-content" class="text-gray-600 mb-6 leading-relaxed"></p>
            <button onclick="closeNotice()" class="bg-blue-500 hover:bg-blue-600 text-white px-10 py-2 rounded-full transition-all">
                确认
            </button>
        </div>
    </div>

    <div id="detail-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-md" onclick="closeDetail(event)">
        <div class="glass-card max-w-4xl w-full max-h-[90vh] overflow-y-auto p-6 md:p-10 relative" onclick="event.stopPropagation()">
            <button onclick="closeDetail(null)" class="absolute top-4 right-6 text-3xl text-gray-400 hover:text-gray-800">&times;</button>
            <h2 id="detail-title" class="text-3xl font-bold mb-6 text-gray-800 border-b pb-4"></h2>
            <div id="detail-media" class="mb-6 rounded-xl overflow-hidden shadow-inner bg-gray-100"></div>
            <p id="detail-desc" class="text-gray-700 text-lg leading-relaxed"></p>
        </div>
    </div>

    <script src="config.js"></script>

    <script>
        // 1. 初始化页面渲染
        function init() {
            const grid = document.getElementById('project-grid');
            
            // 循环配置文件中的数据
            CONFIG.projects.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'glass-card overflow-hidden cursor-pointer';
                card.onclick = () => openDetail(index);
                card.innerHTML = `
                    <div class="h-48 w-full overflow-hidden">
                        <img src="${item.cover}" class="w-full h-full object-cover transform hover:scale-110 transition-transform duration-500">
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-gray-800">${item.title}</h3>
                        <p class="text-blue-500 mt-3 text-sm font-medium italic">View Details →</p>
                    </div>
                `;
                grid.appendChild(card);
            });

            // 2. 显示初始弹窗
            if (CONFIG.notice.show) {
                document.getElementById('notice-title').innerText = CONFIG.notice.title;
                document.getElementById('notice-content').innerText = CONFIG.notice.content;
                document.getElementById('notice-modal').classList.remove('hidden');
            }

            // 3. 初始化粒子
            initParticles();
        }

        // 详情弹窗逻辑
        function openDetail(index) {
            const item = CONFIG.projects[index];
            const mediaContainer = document.getElementById('detail-media');
            
            document.getElementById('detail-title').innerText = item.title;
            document.getElementById('detail-desc').innerText = item.description;
            
            // 根据类型生成视频或图片
            if (item.type === 'video') {
                mediaContainer.innerHTML = `<video src="${item.src}" controls class="w-full"></video>`;
            } else {
                mediaContainer.innerHTML = `<img src="${item.src}" class="w-full h-auto">`;
            }

            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeDetail() {
            document.getElementById('detail-modal').classList.add('hidden');
            document.getElementById('detail-media').innerHTML = ''; // 清空视频防止后台播放
        }

        function closeNotice() {
            document.getElementById('notice-modal').classList.add('hidden');
        }

        // 粒子背景配置
        function initParticles() {
            particlesJS('particles-js', {
                "particles": {
                    "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#3b82f6" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.3, "random": false },
                    "size": { "value": 3, "random": true },
                    "line_linked": { "enable": true, "distance": 150, "color": "#3b82f6", "opacity": 0.2, "width": 1 },
                    "move": { "enable": true, "speed": 1.5, "direction": "none", "random": false, "straight": false, "out_mode": "out" }
                },
                "interactivity": {
                    "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } }
                },
                "retina_detect": true
            });
        }

        // 启动
        window.onload = init;
    </script>
</body>
</html>
